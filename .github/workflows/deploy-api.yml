name: Deploy API

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: deploy-api-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.12.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck API
        run: pnpm --filter @beedle/api typecheck

      - name: Typecheck web
        run: pnpm --filter @beedle/web typecheck

      - name: Test API phrase search relevance
        run: pnpm --filter @beedle/api exec node --test ./tests/search-phrase-relevance.test.mjs

      - name: Test API source guards
        run: pnpm --filter @beedle/api test:source

      - name: Test web search highlighting
        run: pnpm --filter @beedle/web test:highlight

      - name: Deploy API worker
        working-directory: apps/api
        run: pnpm wrangler deploy
